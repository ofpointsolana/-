<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>.</title>

<meta name="description" content="." />
<meta property="og:title" content="." />
<meta property="og:description" content="." />
<meta property="og:type" content="website" />

<style>
:root{
  --bg:#ffffff;
  --fg:#000000;

  /* dot transform vars */
  --x:0px; --y:0px; --s:1; --r:0deg;
}

html,body{
  margin:0;
  width:100vw; height:100vh;
  background:var(--bg);
  overflow:hidden;
}

body{
  display:block;
  transition: background .25s ease;
  -webkit-tap-highlight-color: transparent;
}

/* MAIN DOT */
.dot{
  position:fixed;
  left:50%; top:50%;
  width:32px; height:32px;
  background:var(--fg);
  border-radius:50%;
  cursor: crosshair;
  transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(var(--s)) rotate(var(--r));
  transition: transform .12s ease, background .25s ease;
  touch-action: manipulation;
}

/* PROGRESS BAR */
.progress{
  position:fixed;
  bottom:0; left:0;
  width:100%;
  height:4px;
  z-index: 10;
}
.progress > div{
  width:0%;
  height:100%;
  background:var(--fg);
  transition: width .08s linear, background .25s ease;
}

/* RESOURCE DOTS */
.resources{
  position:fixed;
  left:0; right:0;
  bottom:10px;
  display:flex;
  justify-content:space-between;
  padding:0 14px;
  z-index: 9;
  pointer-events:none;
}
.res-dot{
  width:10px; height:10px;
  border-radius:50%;
  background:var(--fg);
  opacity:0.18;
  display:block;
  text-decoration:none;
  pointer-events:auto;
}
.res-dot:hover{ opacity:0.65; }

/* FINAL OVERLAY (46) */
.overlay{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  padding:24px;
  text-align:center;
  background:var(--bg);
  color:var(--fg);
  font-family: monospace;
  font-size:18px;
  line-height:1.6;
  z-index: 50;
}
.panel{
  max-width: 520px;
  width: 100%;
}
.history{
  display:inline-block;
  margin-top:16px;
  font-size:14px;
  text-decoration:none;
  color:var(--fg);
  opacity:0.7;
}
.history:hover{ opacity:1; }

/* HOLD DOT */
.stage2{
  margin-top:22px;
  display:grid;
  place-items:center;
  gap:14px;
}
.holdDot{
  width:22px; height:22px;
  border-radius:50%;
  background:var(--fg);
  opacity:0.85;
  cursor: crosshair;
  touch-action:none;
  box-shadow: 0 0 0 rgba(0,0,0,0);
  animation: breathe 1.25s infinite;
}
.holdDot.holding{
  animation:none;
  box-shadow: 0 0 18px rgba(0,0,0,0.22);
  transform: scale(1.06);
}
@keyframes breathe{
  0%{ transform: scale(1); opacity:0.85; box-shadow: 0 0 0 rgba(0,0,0,0); }
  50%{ transform: scale(1.12); opacity:1; box-shadow: 0 0 18px rgba(0,0,0,0.18); }
  100%{ transform: scale(1); opacity:0.85; box-shadow: 0 0 0 rgba(0,0,0,0); }
}
.micro{ font-size:12px; opacity:0.28; }

/* MATRIX SCREEN */
.matrix{
  position:fixed;
  inset:0;
  display:none;
  background:#000;
  z-index: 60;
  overflow:hidden;
}
.matrix.on{ display:block; }

.matrixCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

.matrixCenter{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  padding:24px;
  text-align:center;
  font-family: monospace;
  color:#fff;
}

.card{
  max-width: 560px;
  width:100%;
}

.big{ font-size:22px; letter-spacing:0.5px; }
.sub{ margin-top:10px; font-size:13px; opacity:0.75; }

.reveal{
  margin-top:18px;
  font-size:14px;
  opacity:0.9;
  word-break: break-all;
  border:1px solid rgba(255,255,255,0.28);
  padding:10px 12px;
  border-radius:12px;
  display:inline-block;
}

.actions{
  margin-top:14px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  font-size:14px;
  text-decoration:none;
  color:#fff;
  border:2px solid #fff;
  padding:10px 14px;
  border-radius:10px;
  transition: transform .12s ease, background .2s ease, color .2s ease;
}
.btn:active{ transform: scale(0.98); }
.btn:hover{ background:#fff; color:#000; }

/* small “badge image” */
.badgeWrap{ margin-top:18px; display:grid; place-items:center; }
.badge{
  width:120px; height:120px;
  border-radius:16px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.65);
  background:#111;
}
.badge img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
}
</style>
</head>

<body>

<!-- resource dots: TG / GH / PUMP (update pump when ready) -->
<div class="resources">
  <a class="res-dot" href="https://t.me/ofpointsolana" target="_blank" rel="noopener noreferrer"></a>
  <a class="res-dot" href="https://github.com/ofpointsolana/ofpointsolana" target="_blank" rel="noopener noreferrer"></a>
  <a class="res-dot" href="PUMP_LINK_HERE" target="_blank" rel="noopener noreferrer"></a>
</div>

<div class="dot" id="dot"></div>

<div class="progress">
  <div id="bar"></div>
</div>

<!-- MATRIX SCREEN -->
<div class="matrix" id="matrix">
  <canvas class="matrixCanvas" id="matrixCanvas"></canvas>

  <div class="matrixCenter">
    <div class="card">
      <div class="big">You were chosen.</div>
      <div class="sub">Ambassador protocol: active.</div>

      <div class="badgeWrap">
        <div class="badge">
          <img src="file_00000000bbdc720a88325b2f2f78b909.png" alt="." />
        </div>
      </div>

      <div class="reveal" id="revealBox">PUMP_LINK_HERE</div>

      <div class="actions">
        <button class="btn" id="copyBtn" type="button">Copy</button>
        <a class="btn" id="shareBtn" href="#" target="_blank" rel="noopener noreferrer">Share on X</a>
      </div>

      <div class="sub" style="margin-top:10px; opacity:.55;">.</div>
    </div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const PUMP_LINK = "PUMP_LINK_HERE"; // replace after launch

let count = 0;
let flipped = false;
const maxClicks = 46;

const dot = document.getElementById("dot");
const bar = document.getElementById("bar");

const matrix = document.getElementById("matrix");
const shareBtn = document.getElementById("shareBtn");
const copyBtn = document.getElementById("copyBtn");
const revealBox = document.getElementById("revealBox");

/* ---------- theme ---------- */
function setTheme(){
  document.documentElement.style.setProperty("--bg", flipped ? "#000000" : "#ffffff");
  document.documentElement.style.setProperty("--fg", flipped ? "#ffffff" : "#000000");
}

/* ---------- micro anims ---------- */
function pulse(){
  document.documentElement.style.setProperty("--s", "1.1");
  setTimeout(()=>document.documentElement.style.setProperty("--s", "1"), 90);
}

function glitch(){
  document.documentElement.style.setProperty("--s", "0.9");
  document.documentElement.style.setProperty("--r", "6deg");
  setTimeout(()=>{
    document.documentElement.style.setProperty("--s", "1");
    document.documentElement.style.setProperty("--r", "0deg");
  }, 120);
}

/* ---------- progress (for clicks) ---------- */
function updateProgress(){
  bar.style.width = (count / maxClicks * 100) + "%";
}

/* ---------- share/copy ---------- */
function makeShareLink(){
  const text =
    ".\n\n" +
    "You were chosen.\n" +
    "Ambassador of .\n\n" +
    "LINK:\n" + PUMP_LINK + "\n\n" +
    "t.me/ofpointsolana\n" +
    "#solana";
  const url = "https://ofpointsolana.github.io/ofpointsolana/";
  return "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text) + "&url=" + encodeURIComponent(url);
}

copyBtn.addEventListener("click", async ()=>{
  try{
    await navigator.clipboard.writeText(PUMP_LINK);
    copyBtn.textContent = "Copied";
    setTimeout(()=>copyBtn.textContent = "Copy", 1200);
  }catch(e){
    // fallback
    const ta = document.createElement("textarea");
    ta.value = PUMP_LINK;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    copyBtn.textContent = "Copied";
    setTimeout(()=>copyBtn.textContent = "Copy", 1200);
  }
});

/* ---------- FINAL OVERLAY + HOLD ---------- */
let overlayEl = null;
let holdActive = false;
let holdStart = 0;
let holdRAF = null;

function showFinalOverlay(){
  dot.style.display = "none";
  document.querySelector(".resources").style.display = "none";

  overlayEl = document.createElement("div");
  overlayEl.className = "overlay";
  overlayEl.innerHTML = `
    <div class="panel">
      <div>
        Before me, chaos.<br>
        After me, silence.<br><br>
        What am I?
      </div>

      <a href="history.html" class="history">History of .</a>

      <div class="stage2">
        <div class="holdDot" id="holdDot" title="."></div>
        <div class="micro">.</div>
      </div>
    </div>
  `;
  document.body.appendChild(overlayEl);

  // use bottom bar as hold timer
  document.querySelector(".progress").style.display = "block";
  bar.style.width = "0%";

  const holdDot = document.getElementById("holdDot");
  attachHoldLogic(holdDot);
}

function attachHoldLogic(el){
  const HOLD_MS = 5000;

  function startHold(e){
    e.preventDefault();
    el.classList.add("holding");
    holdActive = true;
    holdStart = performance.now();
    loop();
  }

  function endHold(){
    if(!holdActive) return;
    holdActive = false;
    el.classList.remove("holding");
    cancelAnimationFrame(holdRAF);
    bar.style.width = "0%";
  }

  function loop(){
    if(!holdActive) return;
    const t = performance.now();
    const p = Math.min((t - holdStart) / HOLD_MS, 1);
    bar.style.width = (p * 100).toFixed(1) + "%";

    if(p >= 1){
      holdActive = false;
      el.classList.remove("holding");
      bar.style.width = "100%";
      setTimeout(()=>launchMatrix(), 120);
      return;
    }
    holdRAF = requestAnimationFrame(loop);
  }

  el.addEventListener("pointerdown", startHold, {passive:false});
  el.addEventListener("pointerup", endHold, {passive:true});
  el.addEventListener("pointercancel", endHold, {passive:true});
  el.addEventListener("pointerleave", endHold, {passive:true});
}

/* ---------- MATRIX EFFECT (monochrome) ---------- */
const matrixCanvas = document.getElementById("matrixCanvas");
const mctx = matrixCanvas.getContext("2d");
let mRAF = null;

function resizeMatrix(){
  const dpr = window.devicePixelRatio || 1;
  matrixCanvas.width = Math.floor(window.innerWidth * dpr);
  matrixCanvas.height = Math.floor(window.innerHeight * dpr);
  matrixCanvas.style.width = window.innerWidth + "px";
  matrixCanvas.style.height = window.innerHeight + "px";
  mctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize", resizeMatrix);

function launchMatrix(){
  if(overlayEl) overlayEl.remove();
  document.querySelector(".progress").style.display = "none";

  matrix.classList.add("on");
  resizeMatrix();

  // fill reveal + share
  revealBox.textContent = PUMP_LINK;
  shareBtn.href = makeShareLink();

  const chars = ".01";
  const fontSize = 14;
  const columns = Math.max(10, Math.floor(window.innerWidth / fontSize));
  const drops = new Array(columns).fill(1);

  function step(){
    mctx.fillStyle = "rgba(0,0,0,0.12)";
    mctx.fillRect(0,0,window.innerWidth,window.innerHeight);

    mctx.fillStyle = "rgba(255,255,255,0.75)";
    mctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
      const text = chars[Math.floor(Math.random()*chars.length)];
      mctx.fillText(text, i*fontSize, drops[i]*fontSize);

      if(drops[i]*fontSize > window.innerHeight && Math.random() > 0.975){
        drops[i] = 0;
      }
      drops[i]++;
    }

    mRAF = requestAnimationFrame(step);
  }

  // quick contrast “glitch”
  document.body.style.filter = "contrast(140%)";
  setTimeout(()=>document.body.style.filter = "", 180);

  step();
}

/* ---------- MAIN CLICK FLOW (simple) ---------- */
dot.addEventListener("click", ()=>{
  if(matrix.classList.contains("on")) return;

  count++;
  pulse();
  updateProgress();

  if(count === 7){
    flipped = !flipped;
    setTheme();
  }

  if(count === 23){
    glitch();
  }

  if(count === 46){
    showFinalOverlay();
  }
});

setTheme();
</script>

</body>
          </html>
