<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.</title>

<meta name="description" content=".">
<meta property="og:title" content=".">
<meta property="og:description" content=".">
<meta property="og:type" content="website">

<style>
:root{
  --bg:#ffffff;
  --fg:#000000;
  --x:0px;
  --y:0px;
  --s:1;
  --r:0deg;
}

html, body{
  margin:0;
  width:100vw;
  height:100vh;
  background:var(--bg);
  overflow:hidden;
}

body{
  display:block;
  transition:background .25s ease;
  -webkit-tap-highlight-color: transparent;
  font-family: monospace;
}

/* MAIN DOT */
.dot{
  position:fixed;
  left:50%;
  top:50%;
  width:32px;
  height:32px;
  background:var(--fg);
  border-radius:50%;
  cursor:crosshair;
  transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(var(--s)) rotate(var(--r));
  transition:transform .12s ease, background .25s ease;
  touch-action:manipulation;
  z-index:20;
}

/* PROGRESS BAR */
.progress{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  height:4px;
  z-index:100;
}

.progress > div{
  width:0%;
  height:100%;
  background:var(--fg);
  transition:width .08s linear, background .25s ease;
}

/* RESOURCE DOTS */
.resources{
  position:fixed;
  left:0;
  right:0;
  bottom:10px;
  display:flex;
  justify-content:space-between;
  padding:0 14px;
  z-index:10;
  pointer-events:none;
}

.res-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--fg);
  opacity:0.18;
  display:block;
  text-decoration:none;
  pointer-events:auto;
  transition:opacity .2s ease, transform .15s ease;
}

.res-dot:hover{
  opacity:0.65;
  transform:scale(1.2);
}

/* GENERIC OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  padding:24px;
  background:var(--bg);
  color:var(--fg);
  text-align:center;
  font-size:18px;
  line-height:1.6;
  z-index:60;
}

/* DRAW GATE */
.draw{
  position:fixed;
  inset:0;
  display:none;
  background:var(--bg);
  z-index:50;
}

.draw.on{ display:block; }

.drawCanvas{
  width:100vw;
  height:100vh;
  display:block;
  touch-action:none;
}

.pencil{
  position:fixed;
  top:14px;
  right:14px;
  width:44px;
  height:44px;
  border:2px solid var(--fg);
  border-radius:12px;
  display:grid;
  place-items:center;
  font-size:22px;
  user-select:none;
  color:var(--fg);
}

.drawHint{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  opacity:.45;
  color:var(--fg);
}

/* DECOY GATE */
.decoys{
  position:fixed;
  inset:0;
  display:none;
  background:var(--bg);
  z-index:55;
}

.decoys.on{ display:block; }

.decoy-dot{
  position:fixed;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--fg);
  cursor:crosshair;
  transform:translate(-50%, -50%);
}

/* FINAL 46 */
.history{
  display:inline-block;
  margin-top:16px;
  font-size:14px;
  text-decoration:none;
  color:var(--fg);
  opacity:0.8;
}

.history:hover{
  opacity:1;
}

.hold-wrap{
  margin-top:24px;
  display:grid;
  place-items:center;
  gap:12px;
}

.hold-dot{
  width:24px;
  height:24px;
  border-radius:50%;
  background:var(--fg);
  cursor:crosshair;
  touch-action:none;
  animation:holdPulse 1.2s infinite;
}

.hold-dot.holding{
  animation:none;
  transform:scale(1.08);
  box-shadow:0 0 18px rgba(0,0,0,0.22);
}

@keyframes holdPulse{
  0%{
    transform:scale(1);
    opacity:0.85;
    box-shadow:0 0 0 rgba(0,0,0,0);
  }
  50%{
    transform:scale(1.12);
    opacity:1;
    box-shadow:0 0 18px rgba(0,0,0,0.18);
  }
  100%{
    transform:scale(1);
    opacity:0.85;
    box-shadow:0 0 0 rgba(0,0,0,0);
  }
}

.micro{
  font-size:12px;
  opacity:.28;
}

/* MATRIX / CHOSEN SCREEN */
.matrix{
  position:fixed;
  inset:0;
  display:none;
  background:#000;
  z-index:80;
  overflow:hidden;
}

.matrix.on{
  display:block;
}

.matrixCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

.matrixCenter{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  padding:24px;
  text-align:center;
  color:#fff;
}

.card{
  max-width:560px;
  width:100%;
}

.big{
  font-size:22px;
  letter-spacing:.5px;
}

.sub{
  margin-top:10px;
  font-size:13px;
  opacity:.75;
}

.badgeWrap{
  margin-top:18px;
  display:grid;
  place-items:center;
}

.badge{
  width:120px;
  height:120px;
  border-radius:16px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.65);
  background:#111;
}

.badge img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.reveal{
  margin-top:18px;
  font-size:14px;
  opacity:.92;
  word-break:break-all;
  border:1px solid rgba(255,255,255,.28);
  padding:10px 12px;
  border-radius:12px;
  display:inline-block;
}

.actions{
  margin-top:14px;
}

.btn{
  display:inline-block;
  font-size:14px;
  text-decoration:none;
  color:#fff;
  border:2px solid #fff;
  padding:10px 14px;
  border-radius:10px;
  transition:transform .12s ease, background .2s ease, color .2s ease;
}

.btn:hover{
  background:#fff;
  color:#000;
}

.btn:active{
  transform:scale(.98);
}
</style>
</head>

<body>

<div class="resources">
  <a class="res-dot" href="https://t.me/ofpointsolana" target="_blank" rel="noopener noreferrer"></a>
  <a class="res-dot" href="https://github.com/ofpointsolana/ofpointsolana" target="_blank" rel="noopener noreferrer"></a>
  <a class="res-dot" href="PUMP_LINK_HERE" target="_blank" rel="noopener noreferrer"></a>
</div>

<div class="dot" id="dot"></div>

<div class="progress">
  <div id="bar"></div>
</div>

<div class="draw" id="draw">
  <canvas class="drawCanvas" id="drawCanvas"></canvas>
  <div class="pencil" id="pencil">✎</div>
  <div class="drawHint">.</div>
</div>

<div class="decoys" id="decoys"></div>

<div class="matrix" id="matrix">
  <canvas class="matrixCanvas" id="matrixCanvas"></canvas>

  <div class="matrixCenter">
    <div class="card">
      <div class="big">You were chosen.</div>
      <div class="sub">Ambassador of .</div>

      <div class="badgeWrap">
        <div class="badge">
          <img src="file_00000000bbdc720a88325b2f2f78b909.png" alt=".">
        </div>
      </div>

      <div class="reveal" id="revealBox">PUMP_LINK_HERE</div>

      <div class="actions">
        <a class="btn" id="shareBtn" href="#" target="_blank" rel="noopener noreferrer">Share on X</a>
      </div>

      <div class="sub" style="margin-top:10px;opacity:.55;">.</div>
    </div>
  </div>
</div>

<script>
const PUMP_LINK = "PUMP_LINK_HERE";

let count = 0;
let flipped = false;
const maxClicks = 46;

const dot = document.getElementById("dot");
const bar = document.getElementById("bar");

let gate23Done = false;
let gate39Done = false;
let moveMode = false;

/* THEME */
function setTheme(){
  document.documentElement.style.setProperty("--bg", flipped ? "#000000" : "#ffffff");
  document.documentElement.style.setProperty("--fg", flipped ? "#ffffff" : "#000000");
}

/* ANIMS */
function pulse(){
  document.documentElement.style.setProperty("--s", "1.1");
  setTimeout(()=>document.documentElement.style.setProperty("--s", "1"), 90);
}

function glitch(){
  document.documentElement.style.setProperty("--s", "0.9");
  document.documentElement.style.setProperty("--r", "6deg");
  setTimeout(()=>{
    document.documentElement.style.setProperty("--s", "1");
    document.documentElement.style.setProperty("--r", "0deg");
  }, 120);
}

function updateProgress(){
  bar.style.width = (count / maxClicks * 100) + "%";
}

/* RANDOM */
function rand(min, max){
  return Math.random() * (max - min) + min;
}

/* 13 - MOVE DOT */
function moveDotRandom(){
  const margin = 60;
  const x = rand(-((window.innerWidth / 2) - margin), ((window.innerWidth / 2) - margin));
  const y = rand(-((window.innerHeight / 2) - margin), ((window.innerHeight / 2) - margin));
  document.documentElement.style.setProperty("--x", x.toFixed(0) + "px");
  document.documentElement.style.setProperty("--y", y.toFixed(0) + "px");
}

/* 23 - DRAW CIRCLE */
const draw = document.getElementById("draw");
const drawCanvas = document.getElementById("drawCanvas");
const pencil = document.getElementById("pencil");
const ctx = drawCanvas.getContext("2d");

let drawing = false;
let pts = [];

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  drawCanvas.width = Math.floor(window.innerWidth * dpr);
  drawCanvas.height = Math.floor(window.innerHeight * dpr);
  drawCanvas.style.width = window.innerWidth + "px";
  drawCanvas.style.height = window.innerHeight + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--fg").trim();
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function openDrawGate(){
  resizeCanvas();
  ctx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
  pts = [];
  draw.classList.add("on");
}

function closeDrawGate(){
  draw.classList.remove("on");
  pts = [];
  drawing = false;
}

function dist(a,b){
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.hypot(dx,dy);
}

function isCircle(points){
  if(points.length < 45) return false;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  for(const p of points){
    if(p.x < minX) minX = p.x;
    if(p.y < minY) minY = p.y;
    if(p.x > maxX) maxX = p.x;
    if(p.y > maxY) maxY = p.y;
  }

  const w = maxX - minX;
  const h = maxY - minY;

  if(w < 70 || h < 70) return false;

  const ratio = w / h;
  if(ratio < 0.72 || ratio > 1.28) return false;

  const start = points[0];
  const end = points[points.length - 1];

  if(dist(start,end) > Math.min(w,h) * 0.38) return false;

  return true;
}

function drawStart(x,y){
  drawing = true;
  pts = [{x,y}];
  ctx.beginPath();
  ctx.moveTo(x,y);
}

function drawMove(x,y){
  if(!drawing) return;
  pts.push({x,y});
  ctx.lineTo(x,y);
  ctx.stroke();
}

function drawEnd(){
  if(!drawing) return;
  drawing = false;

  if(isCircle(pts)){
    gate23Done = true;
    closeDrawGate();
    glitch();
  }else{
    ctx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
    pts = [];
  }
}

drawCanvas.addEventListener("pointerdown", (e)=>{
  e.preventDefault();
  drawStart(e.clientX, e.clientY);
});

drawCanvas.addEventListener("pointermove", (e)=>{
  e.preventDefault();
  drawMove(e.clientX, e.clientY);
});

drawCanvas.addEventListener("pointerup", (e)=>{
  e.preventDefault();
  drawEnd();
});

drawCanvas.addEventListener("pointercancel", (e)=>{
  e.preventDefault();
  drawEnd();
});

pencil.addEventListener("click", ()=>{
  ctx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
  pts = [];
});

/* 39 - DECOYS */
const decoys = document.getElementById("decoys");
let realDecoyId = null;

function openDecoysGate(){
  decoys.innerHTML = "";
  decoys.classList.add("on");

  const total = 10;
  realDecoyId = Math.floor(Math.random() * total);

  for(let i=0;i<total;i++){
    const d = document.createElement("div");
    d.className = "decoy-dot";
    d.style.left = rand(10, 90) + "vw";
    d.style.top = rand(10, 85) + "vh";
    d.dataset.i = String(i);

    d.addEventListener("click", ()=>{
      if(Number(d.dataset.i) === realDecoyId){
        gate39Done = true;
        decoys.classList.remove("on");
        decoys.innerHTML = "";
        moveDotRandom();
        glitch();
      }else{
        openDecoysGate();
      }
    });

    decoys.appendChild(d);
  }
}

/* 46 - FINAL */
let overlayEl = null;
let holdActive = false;
let holdStart = 0;
let holdRAF = null;

function showFinal(){
  dot.style.display = "none";
  document.querySelector(".resources").style.display = "none";

  overlayEl = document.createElement("div");
  overlayEl.className = "overlay";

  overlayEl.innerHTML = `
    <div class="panel">
      <div>
        Before me, chaos.<br>
        After me, silence.<br><br>
        What am I?
      </div>

      <a href="history.html" class="history">History of .</a>

      <div class="hold-wrap">
        <div class="hold-dot" id="holdDot"></div>
        <div class="micro">.</div>
      </div>
    </div>
  `;

  document.body.appendChild(overlayEl);

  document.querySelector(".progress").style.display = "block";
  bar.style.width = "0%";

  const holdDot = document.getElementById("holdDot");
  attachHoldLogic(holdDot);
}

/* HOLD 5s */
function attachHoldLogic(el){
  const HOLD_MS = 5000;

  function startHold(e){
    e.preventDefault();
    el.classList.add("holding");
    holdActive = true;
    holdStart = performance.now();
    loop();
  }

  function stopHold(){
    if(!holdActive) return;
    holdActive = false;
    el.classList.remove("holding");
    cancelAnimationFrame(holdRAF);
    bar.style.width = "0%";
  }

  function loop(){
    if(!holdActive) return;

    const p = Math.min((performance.now() - holdStart) / HOLD_MS, 1);
    bar.style.width = (p * 100).toFixed(1) + "%";

    if(p >= 1){
      holdActive = false;
      el.classList.remove("holding");
      bar.style.width = "100%";
      setTimeout(()=>launchMatrix(), 120);
      return;
    }

    holdRAF = requestAnimationFrame(loop);
  }

  el.addEventListener("pointerdown", startHold, {passive:false});
  el.addEventListener("pointerup", stopHold, {passive:true});
  el.addEventListener("pointercancel", stopHold, {passive:true});
  el.addEventListener("pointerleave", stopHold, {passive:true});
}

/* MATRIX SCREEN */
const matrix = document.getElementById("matrix");
const matrixCanvas = document.getElementById("matrixCanvas");
const mctx = matrixCanvas.getContext("2d");
const shareBtn = document.getElementById("shareBtn");
const revealBox = document.getElementById("revealBox");

function resizeMatrix(){
  const dpr = window.devicePixelRatio || 1;
  matrixCanvas.width = Math.floor(window.innerWidth * dpr);
  matrixCanvas.height = Math.floor(window.innerHeight * dpr);
  matrixCanvas.style.width = window.innerWidth + "px";
  matrixCanvas.style.height = window.innerHeight + "px";
  mctx.setTransform(dpr,0,0,dpr,0,0);
}

window.addEventListener("resize", resizeMatrix);

function makeShareLink(){
  const text =
    ".\n\n" +
    "You were chosen.\n" +
    "Ambassador of .\n\n" +
    PUMP_LINK + "\n\n" +
    "t.me/ofpointsolana\n" +
    "#solana";

  const url = "https://ofpointsolana.github.io/ofpointsolana/";
  return "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text) + "&url=" + encodeURIComponent(url);
}

function launchMatrix(){
  if(overlayEl) overlayEl.remove();
  document.querySelector(".progress").style.display = "none";

  matrix.classList.add("on");
  resizeMatrix();

  revealBox.textContent = PUMP_LINK;
  shareBtn.href = makeShareLink();

  const chars = ".01";
  const fontSize = 14;
  const columns = Math.max(10, Math.floor(window.innerWidth / fontSize));
  const drops = new Array(columns).fill(1);

  function step(){
    mctx.fillStyle = "rgba(0,0,0,0.12)";
    mctx.fillRect(0,0,window.innerWidth,window.innerHeight);

    mctx.fillStyle = "rgba(255,255,255,0.75)";
    mctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
      const text = chars[Math.floor(Math.random() * chars.length)];
      mctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if(drops[i] * fontSize > window.innerHeight && Math.random() > 0.975){
        drops[i] = 0;
      }

      drops[i]++;
    }

    requestAnimationFrame(step);
  }

  step();
}

/* MAIN CLICK */
dot.addEventListener("click", ()=>{
  if(draw.classList.contains("on")) return;
  if(decoys.classList.contains("on")) return;
  if(matrix.classList.contains("on")) return;

  count++;
  pulse();
  updateProgress();

  if(count === 7){
    flipped = !flipped;
    setTheme();
  }

  if(count === 13){
    moveMode = true;
    moveDotRandom();
  }

  if(moveMode && count >= 13 && count < 23){
    moveDotRandom();
  }

  if(count === 23){
    if(!gate23Done){
      openDrawGate();
      count = 22;
      updateProgress();
      return;
    }else{
      glitch();
    }
  }

  if(count === 39){
    if(!gate39Done){
      openDecoysGate();
      count = 38;
      updateProgress();
      return;
    }
  }

  if(count === 46){
    showFinal();
  }
});

setTheme();
</script>

</body>
</html>
